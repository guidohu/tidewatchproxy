services:
  proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - PORT=8080
      - STORMGLASS_API_KEY=mysupersecretkey
      - ALLOWED_APP_IDS=myappid,myotherappid
    depends_on:
      - redis
    volumes:
      - ./custom_locations.csv:/app/custom_locations.csv
    command: ["--use-cache=true"]

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
